app = 'activity-tracker'
primary_region = 'iad'

[build]

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  APP_URL = 'https://activity-tracker.fly.dev'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/var/www/html/database/database.sqlite'
  LOG_CHANNEL = 'stderr'
  SESSION_DRIVER = 'file'
  CACHE_STORE = 'file'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
